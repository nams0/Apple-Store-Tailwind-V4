<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/output.css">
    <link rel="stylesheet" href="./fonts.css">
    <title>Apple Store</title>
</head>

<body>
    <div class="h-13 md:h-[70px] bg-primary flex justify-center items-center">
        <p class="text-white text-sm md:text-base font-semibold">تا ۷۰% تخفیف برای لوازم جانبی اورجینال آیفون</p>
    </div>

    <header class="max-lg:shadow-[0_0_20px_-5px_#0000001A] lg:border-b-2 border-[#e6e6e6]">
        <div class="container m-auto flex flex-col gap-6 px-6 py-6 sm:px-2 sm:py-8 ">
            <div class="flex items-center justify-between">
                <span class="md:hidden cursor-pointer">
                    <img src="./assets/svg/hamburger.svg">
                </span>

                <div class="flex items-center gap-1 md:gap-5 text-primary font-semibold">
                    <img class="w-8 md:w-13" src="./assets/svg/app-store.svg">
                    <p class="w-5 leading-4 md:w-fit md:text-[30px]">اپل استور</p>
                </div>

                <div class="hidden lg:flex gap-2">
                    <button
                        class="h-11 w-34 flex items-center justify-center gap-3 rounded-full bg-primary cursor-pointer">
                        <div class="flex flex-col gap-1">
                            <span class="block h-0.5 w-4 bg-white rounded-full"></span>
                            <span class="block h-0.5 w-4 bg-white rounded-full"></span>
                            <span class="block h-0.5 w-4 bg-white rounded-full"></span>
                        </div>
                        <span class="text-white">محصولات</span>
                    </button>
                    <div class="w-90 flex justify-between bg-[#fbfbfb] py-2.5 px-4 rounded-full">
                        <input type="text" placeholder="جستجو کنید"
                            class="w-full bg-[#fbfbfb] placeholder:text-[#303030] placeholder:font-medium focus:outline-0">
                        <img src="./assets/svg/search-normal.svg">
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="relative cursor-pointer">
                        <img class="sm:w-6" src="./assets/svg/shopping-cart.svg">
                        <span
                            class="text-center w-3 h-3 text-[10px] bg-primary rounded-full text-white absolute -top-1 -right-1">0</span>
                    </div>
                    <div class="relative cursor-pointer">
                        <img class="sm:w-6" src="./assets/svg/heart.svg">
                        <span
                            class="w-3 h-3 text-center text-[10px] bg-primary rounded-full text-white absolute -top-1 -right-1">0</span>
                    </div>
                </div>
            </div>
            <div class="lg:hidden w-full flex justify-between bg-[#f1f1f1] py-2.5 px-4 rounded-full">
                <input type="text" placeholder="جستجو کنید"
                    class="focus:outline-0 w-full placeholder:text-[#282828b2] placeholder:font-medium">
                <img src="./assets/svg/search-normal.svg">
            </div>
        </div>
    </header>
</body>

</html>
