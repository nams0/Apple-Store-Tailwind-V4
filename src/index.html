<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/output.css">
    <link rel="stylesheet" href="./fonts.css">
    <title>Apple Store</title>
</head>

<body>
    <div class="h-13 md:h-[70px] bg-primary flex justify-center items-center">
        <p class="text-white text-sm md:text-base font-semibold">تا ۷۰% تخفیف برای لوازم جانبی اورجینال آیفون</p>
    </div>

    <header class="max-lg:shadow-[0_0_20px_-5px_#0000001A] lg:border-b-2 border-[#e6e6e6] xl:px-6">
        <div class="container m-auto flex flex-col gap-6 px-6 py-6 sm:px-2 sm:py-8">
            <div class="flex items-center justify-between">
                <span class="md:hidden cursor-pointer">
                    <img src="./assets/svg/hamburger.svg">
                </span>

                <div class="flex items-center gap-1 md:gap-2 text-primary font-semibold">
                    <img class="w-8 md:w-13" src="./assets/svg/app-store.svg">
                    <p class="w-5 leading-4 md:w-fit md:text-[30px]">اپل استور</p>
                </div>

                <div class="hidden lg:flex gap-2">
                    <button
                        class="h-11 w-34 flex items-center justify-center gap-3 rounded-full bg-primary cursor-pointer">
                        <div class="flex flex-col gap-1">
                            <span class="block h-0.5 w-4 bg-white rounded-full"></span>
                            <span class="block h-0.5 w-4 bg-white rounded-full"></span>
                            <span class="block h-0.5 w-4 bg-white rounded-full"></span>
                        </div>
                        <span class="text-white">محصولات</span>
                    </button>
                    <div class="w-90 flex justify-between bg-[#fbfbfb] py-2.5 px-4 rounded-full">
                        <input type="text" placeholder="جستجو کنید"
                            class="w-full bg-[#fbfbfb] placeholder:text-[#303030] placeholder:font-medium focus:outline-0">
                        <img src="./assets/svg/search-normal.svg">
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="relative cursor-pointer">
                        <img class="sm:w-6" src="./assets/svg/shopping-cart.svg">
                        <span
                            class="text-center w-3 h-3 text-[10px] bg-primary rounded-full text-white absolute -top-1 -right-1">0</span>
                    </div>
                    <div class="relative cursor-pointer">
                        <img class="sm:w-6" src="./assets/svg/heart.svg">
                        <span
                            class="w-3 h-3 text-center text-[10px] bg-primary rounded-full text-white absolute -top-1 -right-1">0</span>
                    </div>
                </div>
            </div>
            <div class="lg:hidden w-full flex justify-between bg-[#f1f1f1] py-2.5 px-4 rounded-full">
                <input type="text" placeholder="جستجو کنید"
                    class="focus:outline-0 w-full placeholder:text-[#282828b2] placeholder:font-medium">
                <img src="./assets/svg/search-normal.svg">
            </div>
        </div>
    </header>

    <div
        class="container m-auto flex flex-wrap justify-center md:justify-between gap-x-3 gap-y-5 mt-8 md:bg-lightGray rounded-2xl md:py-7 md:px-10 lg:px-36">
        <a href="#" class="w-20 md:w-fit h-20 flex flex-col items-center justify-center gap-2 bg-lightGray rounded-lg">
            <img class="w-8 md:w-11" src="./assets/svg/apple-watch.svg">
            <span class="text-xs md:text-base font-medium text-[#747474]">اپل واچ</span>
        </a>
        <a href="#" class="w-20 md:w-fit h-20 flex flex-col items-center justify-center gap-2 bg-lightGray rounded-lg">
            <img class="w-8 md:w-11" src="./assets/svg/airpods.svg">
            <span class="text-xs md:text-base font-medium text-primary">ایرپاد</span>
        </a>
        <a href="#" class="w-20 md:w-fit h-20 flex flex-col items-center justify-center gap-2 bg-lightGray rounded-lg">
            <img class="w-8 md:w-11" src="./assets/svg/ipad.svg">
            <span class="text-xs md:text-base font-medium text-[#747474]">آیپد</span>
        </a>
        <a href="#" class="w-20 md:w-fit h-20 flex flex-col items-center justify-center gap-2 bg-lightGray rounded-lg">
            <img class="w-8 md:w-11" src="./assets/svg/iphone.svg">
            <span class="text-xs md:text-base font-medium text-[#747474]">آیفون</span>
        </a>
        <a href="#" class="w-20 md:w-fit h-20 flex flex-col items-center justify-center gap-2 bg-lightGray rounded-lg">
            <img class="w-8 md:w-11" src="./assets/svg/magsafe.svg">
            <span class="text-xs md:text-base font-medium text-[#747474]">شارژر مگ سیف</span>
        </a>
        <a href="#" class="w-20 md:w-fit h-20 flex flex-col items-center justify-center gap-2 bg-lightGray rounded-lg">
            <img class="w-8 md:w-11" src="./assets/svg/homepod.svg">
            <span class="text-xs md:text-base font-medium text-[#747474]">هوم پاد</span>
        </a>
        <a href="#" class="w-20 md:w-fit h-20 flex flex-col items-center justify-center gap-2 bg-lightGray rounded-lg">
            <img class="w-8 md:w-11" src="./assets/svg/apple-tv.svg">
            <span class="text-xs md:text-base font-medium text-[#747474]">اپل تیوی</span>
        </a>
    </div>

    <main class="my-16 md:my-24">
        <div class="flex flex-col items-center max-md:gap-2 my-4">
            <img class="w-25 lg:w-70" src="./assets/svg/apple-vision-pro.svg">
            <p class="font-medium">اولین نفری باشید که ویژن پرو میخرید</p>
            <button
                class="bg-primary w-24 h-8 lg:w-35 lg:h-9 text-sm text-white rounded lg:rounded-lg md:mt-4 shadow-[0_0_15px_3px_#ff510b66] cursor-pointer hover:text-lg transition-all">خرید
                کنید</button>
        </div>

        <div class="relative flex items-center my-10 md:my-16 px-14">
            <img class="absolute right-0 w-12 sm:w-20 lg:w-32 xl:w-46" src="./assets/images/right.webp">
            <img class="m-auto max-2xl:w-240" src="./assets/images/glasses.webp">
            <img class="absolute left-0 w-12 sm:w-20 lg:w-32 xl:w-46" src="./assets/images/left.webp">
        </div>

        <div class="flex justify-center gap-2">
            <div class="w-2.5 h-2.5 md:w-4 md:h-4 bg-[#c5c5c5] rounded-full"></div>
            <div class="w-2.5 h-2.5 md:w-4 md:h-4 bg-[#c5c5c5] rounded-full"></div>
            <div class="w-2.5 h-2.5 md:w-4 md:h-4 bg-[#c5c5c5] rounded-full"></div>
            <div class="w-2.5 h-2.5 md:w-4 md:h-4 bg-[#ff8b14] rounded-full"></div>
        </div>
    </main>
</body>

</html>
